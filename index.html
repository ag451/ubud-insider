<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubud Insider | Local Recommendations</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <div class="logo-icon">🌺</div>
                <h1 class="logo">Ubud Insider</h1>
            </div>
            <p class="tagline">Curated recommendations for the mindful traveler</p>
            
            <!-- View Toggle -->
            <div class="view-toggle">
                <button class="view-btn active" data-view="list">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                    List
                </button>
                <button class="view-btn" data-view="map">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="1 6 1 22 8 18 16 22 21 18 21 2 16 6 8 2 1 6"></polygon>
                        <line x1="8" y1="2" x2="8" y2="18"></line>
                        <line x1="16" y1="6" x2="16" y2="22"></line>
                    </svg>
                    Map
                </button>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-section">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search places, food, yoga...">
                <button id="clearSearch" class="clear-btn" style="display: none;">✕</button>
            </div>
        </div>

        <!-- Category Filter -->
        <div class="category-section">
            <div class="category-scroll" id="categoryList">
                <button class="category-btn active" data-category="all">
                    <span class="category-icon">🏠</span>
                    <span class="category-name">All</span>
                </button>
                <!-- Categories will be populated by JS -->
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <span id="statsText">Showing all places</span>
            <span class="favorites-count" id="favCount" style="display: none;">
                ⭐ <span id="favCountNum">0</span> saved
            </span>
        </div>

        <!-- List View -->
        <div class="places-container" id="placesList">
            <!-- Places will be populated by JS -->
        </div>

        <!-- Map View -->
        <div class="map-container" id="mapContainer" style="display: none;">
            <div id="map"></div>
            <div class="map-legend">
                <span class="legend-item">🍳 Breakfast</span>
                <span class="legend-item">🍽️ Dinner</span>
                <span class="legend-item">🧘 Yoga</span>
                <span class="legend-item">💆 Spa</span>
            </div>
        </div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-icon">🔍</div>
            <h3>No places found</h3>
            <p>Try adjusting your search or filters</p>
        </div>

        <!-- Place Detail Modal -->
        <div class="modal" id="placeModal" style="display: none;">
            <div class="modal-backdrop" onclick="closeModal()"></div>
            <div class="modal-content">
                <button class="modal-close" onclick="closeModal()">✕</button>
                
                <div class="modal-body" id="modalBody">
                    <!-- Place details will be populated here -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Made with <span class="footer-heart">❤️</span> in Ubud</p>
        </footer>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script src="data.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
